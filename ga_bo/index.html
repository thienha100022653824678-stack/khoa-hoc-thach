
<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Khóa học gà bò</title>

<style>

*{box-sizing:border-box;}

body{
font-family:'Segoe UI',sans-serif;
background:#e9e9e9;
display:flex;
justify-content:center;
padding:20px;
margin:0;
}

.card{
background:white;
width:100%;
max-width:480px;
border-radius:20px;
overflow:hidden;
}

.hero img{
width:100%;
height:260px;
object-fit:cover;
}

.content{
padding:30px;
text-align:center;
}

.price-new{
font-size:34px;
font-weight:900;
color:#ff5c8a;
}

.price-old{
text-decoration:line-through;
color:#bbb;
}

.timer-box{
background:#fff9db;
padding:12px;
border-radius:12px;
color:#ff2e63;
font-weight:bold;
margin-bottom:25px;
display:none;
}

.btn-reg{
background:#ff5c8a;
color:white;
border:none;
width:100%;
padding:20px;
border-radius:15px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<div class="hero">
<img src="https://cdn.tgdd.vn/Files/2021/07/27/1371137/tat-tan-tat-meo-bao-quan-thit-heo-ga-bo-ca-tuoi-ngon-ca-thang-202201131402288755.jpg">
</div>

<div class="content">

<h1>Khóa học gà bò</h1>

<p>tự làm gà bò</p>

<div>

<span class="price-new">399.000đ</span>



</div>

<div class="timer-box" id="s-b">

Sale kết thúc sau:
<span id="t">...</span>

</div>

<div style="text-align:left;margin-top:20px;white-space:pre-wrap">

-Bánh thuyền hạt
-Bánh quy bơ Mã Lai
-Bánh quy bơ Tứ Xuyên
-Bánh quy bơ trà hạt rim mật ong
-Bánh quy bơ phô mai
-Bánh quy bơ mix loại hạt

</div>

<button class="btn-reg">

Đăng ký ngay

</button>

</div>

</div>

<script>

function pD(s){

const p=s.split('/');

return new Date(p[4],p[3]-1,p[2],p[0],p[1]).getTime();

}

const end=pD("12/15/11/03/2026");

setInterval(()=>{

const diff=end-new Date().getTime();

if(diff<=0){

if(document.getElementById('s-b'))
document.getElementById('s-b').style.display='none';

return;

}

const h=Math.floor(diff/3600000);
const m=Math.floor((diff%3600000)/60000);
const s=Math.floor((diff%60000)/1000);

document.getElementById('t').innerText=
(h<10?'0'+h:h)+":"+
(m<10?'0'+m:m)+":"+
(s<10?'0'+s:s);

},1000);

</script>

</body>
</html>
