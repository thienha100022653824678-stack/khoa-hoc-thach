<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Yêu Nấu Ăn</title><style>:root{--pink:#ff5c8a;--bg:#f8f9fa;}*{box-sizing:border-box;transition:all 0.3s;}body{font-family:'Segoe UI',sans-serif;background:var(--bg);margin:0;padding:20px;text-align:center;}h1{color:var(--pink);font-size:32px;}.search-box{margin-bottom:40px;}#s{width:100%;max-width:500px;padding:15px 25px;border-radius:30px;border:2px solid #ffcad4;outline:none;font-size:16px;}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:30px;max-width:1200px;margin:auto;}.card{background:white;border-radius:20px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,0.05);position:relative;}.img-w{position:relative;height:180px;}img{width:100%;height:100%;object-fit:cover;}.badge{position:absolute;top:10px;left:10px;background:var(--pink);color:white;padding:4px 10px;border-radius:8px;font-size:12px;font-weight:bold;display:none;}.info{padding:20px;text-align:left;}h3{font-size:18px;margin:0 0 10px 0;height:45px;overflow:hidden;}.n{color:var(--pink);font-weight:900;font-size:24px;}.o{color:#bbb;text-decoration:line-through;margin-left:10px;font-size:15px;display:none;}.m-timer{background:#fff9db;padding:8px;border-radius:10px;color:#ff2e63;font-weight:bold;font-size:12px;margin-bottom:15px;text-align:center;}.m-btn{background:var(--pink);color:white;border:none;padding:12px;border-radius:10px;width:100%;cursor:pointer;font-weight:bold;}</style></head>
  <body>
    <h1>Yêu Nấu Ăn - Bếp Bánh Sunny</h1>
    <div class="search-box"><input type="text" id="s" onkeyup="search()" placeholder="🔍 Tìm khóa học..."></div>
    <div class="grid"><div class="card" data-name="khóa học bánh quy bơ">
      <div class="img-w"><img src="/Images/banhquy.jpg"><span class="badge" id="b-banh_quy_bo">SALE</span></div>
      <div class="info">
        <h3>Khóa học Bánh Quy Bơ</h3>
        <div class="p-box"><span class="n" id="n-banh_quy_bo">399.000đ</span><span class="o" id="o-banh_quy_bo">399.000đ</span></div>
        <div class="m-timer" id="t-b-banh_quy_bo" data-start="13/10/11/03/2026" data-end="14/10/11/03/2026">⏱ <span class="t-val">...</span></div>
        <button class="m-btn" onclick="window.location.href='https://yeunauan.live/banh_quy_bo/'">Xem chi tiết</button>
      </div>
    </div><div class="card" data-name="khóa học bánh chuối">
      <div class="img-w"><img src="https://cdn.hstatic.net/files/200000700229/article/banh-chuoi-chien-thumb_622cc7da733a46b68b12ad97bb85e6dd.jpg"><span class="badge" id="b-banh_chuoi">SALE</span></div>
      <div class="info">
        <h3>Khóa học Bánh Chuối</h3>
        <div class="p-box"><span class="n" id="n-banh_chuoi">399.000đ</span><span class="o" id="o-banh_chuoi">399.000đ</span></div>
        <div class="m-timer" id="t-b-banh_chuoi" data-start="13/10/11/03/2026" data-end="14/10/11/03/2026">⏱ <span class="t-val">...</span></div>
        <button class="m-btn" onclick="window.location.href='https://yeunauan.live/banh_chuoi/'">Xem chi tiết</button>
      </div>
    </div><div class="card" data-name="khóa học tôm chiên">
      <div class="img-w"><img src="https://cdn.tgdd.vn/2022/09/CookDish/2-cach-lam-tom-chien-xu-rao-dau-gion-rum-ai-cung-me-avt-1200x676.jpg"><span class="badge" id="b-tom_chien">SALE</span></div>
      <div class="info">
        <h3>Khóa học Tôm Chiên</h3>
        <div class="p-box"><span class="n" id="n-tom_chien">399.000đ</span><span class="o" id="o-tom_chien">399.000đ</span></div>
        <div class="m-timer" id="t-b-tom_chien" data-start="13/10/11/03/2026" data-end="14/10/11/03/2026">⏱ <span class="t-val">...</span></div>
        <button class="m-btn" onclick="window.location.href='https://yeunauan.live/tom_chien/'">Xem chi tiết</button>
      </div>
    </div><div class="card" data-name="khóa học gà bò">
      <div class="img-w"><img src="https://cdn.tgdd.vn/Files/2021/07/27/1371137/tat-tan-tat-meo-bao-quan-thit-heo-ga-bo-ca-tuoi-ngon-ca-thang-202201131402288755.jpg"><span class="badge" id="b-ga_bo">SALE</span></div>
      <div class="info">
        <h3>Khóa học gà bò</h3>
        <div class="p-box"><span class="n" id="n-ga_bo">399.000đ</span><span class="o" id="o-ga_bo">399.000đ</span></div>
        <div class="m-timer" id="t-b-ga_bo" data-start="13/10/11/03/2026" data-end="14/10/11/03/2026">⏱ <span class="t-val">...</span></div>
        <button class="m-btn" onclick="window.location.href='https://yeunauan.live/ga_bo/'">Xem chi tiết</button>
      </div>
    </div></div>
    <script>
      function search(){ let v=document.getElementById('s').value.toLowerCase(); document.querySelectorAll('.card').forEach(c=>{ c.style.display=c.getAttribute('data-name').includes(v)?"":"none"; }); }
      function pD(s){ const p=s.split('/'); return new Date(p[4],p[3]-1,p[2],p[0],p[1]).getTime(); }
      const list = [{id:"banh_quy_bo",s:"13/10/11/03/2026",e:"14/10/11/03/2026",ps:"199.000đ",po:"399.000đ"},{id:"banh_chuoi",s:"13/10/11/03/2026",e:"14/10/11/03/2026",ps:"199.000đ",po:"399.000đ"},{id:"tom_chien",s:"13/10/11/03/2026",e:"14/10/11/03/2026",ps:"199.000đ",po:"399.000đ"},{id:"ga_bo",s:"13/10/11/03/2026",e:"14/10/11/03/2026",ps:"199.000đ",po:"399.000đ"}];
      setInterval(()=>{
        const now = new Date().getTime();
        list.forEach(i=>{
          const start=pD(i.s), end=pD(i.e), cur=document.getElementById('n-'+i.id), old=document.getElementById('o-'+i.id), timer=document.getElementById('t-b-'+i.id), bad=document.getElementById('b-'+i.id);
          if(now < start){
            cur.innerText=i.po; old.style.display="none"; timer.style.display="block"; bad.style.display="none";
            const d=start-now; const h=Math.floor(d/3600000),m=Math.floor((d%3600000)/60000),s=Math.floor((d%60000)/1000);
            timer.querySelector('.t-val').innerText="Sắp sale: "+(h<10?'0'+h:h)+":"+(m<10?'0'+m:m)+":"+(s<10?'0'+s:s);
          } else if(now >= start && now <= end){
            cur.innerText=i.ps; old.style.display="inline"; old.innerText=i.po; timer.style.display="block"; bad.style.display="block";
            const d=end-now; const h=Math.floor(d/3600000),m=Math.floor((d%3600000)/60000),s=Math.floor((d%60000)/1000);
            timer.querySelector('.t-val').innerText=(h<10?'0'+h:h)+":"+(m<10?'0'+m:m)+":"+(s<10?'0'+s:s);
          } else {
            cur.innerText=i.po; old.style.display="none"; timer.style.display="none"; bad.style.display="none";
          }
        });
      },1000);
    </script></body></html>
