<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bếp Bánh Sunny - Hệ Thống Khóa Học Online</title>
    <style>
        :root { --pink: #ff5c8a; --pink-light: #ffeff1; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        /* GIAO DIỆN THẺ KHÓA HỌC */
        .card { background: white; width: 100%; max-width: 420px; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #eee; }
        
        /* ẢNH BÌA (Đã xóa biểu tượng Play) */
        .hero { width: 100%; height: 260px; background: #eee; }
        .hero img { width: 100%; height: 100%; object-fit: cover; }

        /* NỘI DUNG CHI TIẾT */
        .content { padding: 25px; text-align: left; }
        h1 { font-size: 24px; color: var(--text); margin: 0 0 8px 0; }
        p.desc { color: #666; font-size: 15px; margin-bottom: 20px; line-height: 1.5; min-height: 45px; }
        
        /* GIÁ CẢ (Đã xóa % giảm giá) */
        .price-row { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
        .price-new { font-size: 34px; font-weight: 800; color: var(--text); }
        .price-old { font-size: 18px; color: #bbb; text-decoration: line-through; }

        /* ĐẾM NGƯỢC */
        .timer-row { display: flex; align-items: center; gap: 8px; color: #ff2e63; margin-bottom: 25px; font-size: 16px; font-weight: 600; }
        #timer { font-weight: 800; font-size: 20px; }

        /* NÚT ĐĂNG KÝ */
        .btn-reg { 
            background: linear-gradient(135deg, #ff85a2, #ff5c8a); 
            color: white; border: none; width: 100%; padding: 16px; 
            border-radius: 12px; font-size: 18px; font-weight: bold; 
            cursor: pointer; box-shadow: 0 5px 20px rgba(255, 92, 138, 0.3); 
        }

        /* MODAL THANH TOÁN */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; backdrop-filter: blur(5px); align-items: center; justify-content: center; padding: 20px; }
        .modal-inner { background: white; width: 100%; max-width: 380px; padding: 30px; border-radius: 25px; text-align: center; position: relative; }
        .close { position: absolute; top: 15px; right: 20px; font-size: 30px; cursor: pointer; color: #ccc; }
        input[type="text"] { width: 100%; padding: 14px; margin: 15px 0; border: 1px solid #ddd; border-radius: 12px; box-sizing: border-box; font-size: 16px; }
        .btn-send { background: #333; color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        #successBox { display: none; margin-top: 20px; }
        .btn-tele { display: inline-block; background: #0088cc; color: white; padding: 12px 25px; border-radius: 10px; text-decoration: none; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <div class="hero">
        <img id="heroImg" src="" alt="Course Image">
    </div>
    <div class="content">
        <h1 id="mainTitle">Loading...</h1>
        <p class="desc" id="mainDesc">Loading...</p>
        
        <div class="price-row">
            <span class="price-new" id="show-price">0đ</span>
            <span class="price-old" id="old-price">0đ</span>
        </div>

        <div class="timer-row">
            <span style="font-size: 20px;">⏱</span>
            <span id="timer-label">Ưu đãi chỉ còn:</span>
            <span id="timer">60:00</span>
        </div>

        <button class="btn-reg" onclick="openModal()">Đăng ký ngay</button>
    </div>
</div>

<div id="paymentModal" class="modal">
    <div class="modal-inner">
        <span class="close" onclick="closeModal()">&times;</span>
        <h3 style="margin: 0 0 10px 0;">Thanh toán khóa học</h3>
        <p>Số tiền: <strong id="modal-price" style="color: #ff2e63; font-size: 22px;">0đ</strong></p>
        <img id="qrImg" src="" style="width:100%; max-width:240px; border-radius:15px; margin: 10px 0; border: 1px solid #eee;">
        <p style="font-size:12px; background:#fff0f3; padding:10px; border-radius:10px; color:#ff2e63; border:1px dashed #ff2e63; font-weight:bold;">Nội dung CK: Tên Zalo của bạn</p>
        
        <form id="payForm">
            <input type="text" id="zaloName" placeholder="Nhập Tên Zalo của bạn" required>
            <p style="text-align:left; font-size:12px; margin-bottom:5px; color:#666;">Tải ảnh bill chuyển khoản:</p>
            <input type="file" id="bill" accept="image/*" required style="width:100%; margin-bottom:20px;">
            <button type="submit" id="submitBtn" class="btn-send">Xác nhận & Nhận link học</button>
        </form>

        <div id="successBox">
            <p style="font-weight:bold; color:#0d47a1;">🎉 Gửi Bill thành công!</p>
            <a id="groupLink" href="#" target="_blank" class="btn-tele">VÀO LỚP HỌC NGAY</a>
        </div>
    </div>
</div>

<script>
// ============================================================
// CHỈ CẦN SỬA CÁC GIÁ TRỊ TRONG CONFIG NÀY
const CONFIG = {
    courseID: 'thach_chan_meo_01', // KHÔNG dùng dấu cách ở đây
    courseName: 'Khóa học Thạch Chân Mèo',
    courseDesc: 'Học bí quyết làm thạch chân mèo cực xinh để bán online hiệu quả!',
    heroImg: 'anh-bia.jpg',
    qrImg: 'qr-thanh-toan.jpg',
    priceSale: '199.000đ',
    priceOld: '399.000đ',
    teleLink: 'https://t.me/+6tr9ueF0hyUxNTJl',
    
    // Thông tin Bot Telegram cố định
    token: '8603037788:AAEJgoK5Zos3Ta610NHubuQRI8Uh1W5dzNk',
    chatId: '6699534762',
    duration: 60 * 60 // 60 phút
};
// ============================================================

// Đổ dữ liệu ra giao diện
document.getElementById('mainTitle').innerText = CONFIG.courseName;
document.getElementById('mainDesc').innerText = CONFIG.courseDesc;
document.getElementById('heroImg').src = CONFIG.heroImg;
document.getElementById('qrImg').src = CONFIG.qrImg;
document.getElementById('show-price').innerText = CONFIG.priceSale;
document.getElementById('old-price').innerText = CONFIG.priceOld;
document.getElementById('modal-price').innerText = CONFIG.priceSale;
document.getElementById('groupLink').href = CONFIG.teleLink;

// LOGIC ĐẾM NGƯỢC
let storageKey = 'sunny_timer_' + CONFIG.courseID;
let startTime = localStorage.getItem(storageKey);
if (!startTime) {
    startTime = Date.now();
    localStorage.setItem(storageKey, startTime);
}

function updateTimer() {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const remaining = CONFIG.duration - elapsed;
    if (remaining > 0) {
        const mins = Math.floor(remaining / 60);
        const secs = remaining % 60;
        document.getElementById('timer').innerText = `${mins < 10 ? '0'+mins : mins}:${secs < 10 ? '0'+secs : secs}`;
    } else {
        document.getElementById('timer-label').innerText = "🔥 Ưu đãi đã kết thúc!";
        document.getElementById('timer').innerText = "";
        document.getElementById('show-price').innerText = CONFIG.priceOld;
        document.getElementById('old-price').style.display = "none";
        document.getElementById('modal-price').innerText = CONFIG.priceOld;
        clearInterval(timerInterval);
    }
}
const timerInterval = setInterval(updateTimer, 1000);
updateTimer();

function openModal() { document.getElementById('paymentModal').style.display = 'flex'; }
function closeModal() { document.getElementById('paymentModal').style.display = 'none'; }

document.getElementById('payForm').onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const isExpired = Math.floor((Date.now() - startTime) / 1000) >= CONFIG.duration;
    const finalPrice = isExpired ? CONFIG.priceOld : CONFIG.priceSale;
    
    btn.innerText = "Đang gửi xác nhận...";
    btn.disabled = true;

    const fd = new FormData();
    fd.append('chat_id', CONFIG.chatId);
    fd.append('photo', document.getElementById('bill').files[0]);
    fd.append('caption', `🔔 ĐƠN MỚI!\n📘 Khóa: ${CONFIG.courseName}\n👤 Zalo: ${document.getElementById('zaloName').value}\n💰 Giá mua: ${finalPrice}\nCheck bank nhé Sunny!`);

    try {
        const res = await fetch(`https://api.telegram.org/bot${CONFIG.token}/sendPhoto`, { method: 'POST', body: fd });
        if (res.ok) {
            document.getElementById('payForm').style.display = 'none';
            document.getElementById('successBox').style.display = 'block';
        }
    } catch (err) { alert("Lỗi kết nối!"); btn.disabled = false; }
};

window.onclick = (e) => { if(e.target.id === 'paymentModal') closeModal(); }
</script>
</body>
</html>
