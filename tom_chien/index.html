ript.google.com/macros/s/AKfycbxnZIRbcHx0e1BuV8lagV1bVTz1D3WgoUbDF3JbgMtAcGeQBjY/exec',{method:'POST',body:JSON.stringify({action:'record_sale',nick:n,courseID:'tom_chien',courseName:'Khóa học Tôm Chiên',price:document.getElementById('p-m').innerText,fileBase64:base64,fileType:file.type})});const out=await res.text();if(out==='OK'){document.getElementById('f-box').style.display='none';document.getElementById('s-box').style.display='block';}else{alert(out==='FILE_TOO_LARGE'?"Ảnh quá lớn (>5MB)!":"⚠️ Bạn vừa gửi đơn, vui lòng chờ 2 phút!");resetBtn();}}catch(e){alert("Lỗi kết nối!");resetBtn();}};}function resetBtn(){const btn=document.getElementById('btnSub');let count=30;const timer=setInterval(()=>{btn.innerText="Chờ "+count+"s...";count--;if(count<0){clearInterval(timer);sending=false;btn.disabled=false;btn.innerText="Xác nhận";}},1000);}function pD(s){const p=s.split('/');return new Date(p[4],p[3]-1,p[2],p[0],p[1]).getTime();}const end=pD("12/15/11/03/2026");const iv=setInterval(()=>{const diff=end-new Date().getTime();if(diff<=0){clearInterval(iv);if(document.getElementById('s-b'))document.getElementById('s-b').style.display='none';if(document.getElementById('p-o'))document.getElementById('p-o').style.display='none';document.getElementById('p-m').innerText="399.000đ";document.getElementById('p-pay').innerText="399.000đ";return;}const h=Math.floor(diff/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);document.getElementById('t').innerText=(h<10?'0'+h:h)+":"+(m<10?'0'+m:m)+":"+(s<10?'0'+s:s);},1000);</script></body></html>
