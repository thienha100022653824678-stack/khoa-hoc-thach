<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Khóa học Bánh Quy Bơ</title><style>body{-webkit-user-select:none;user-select:none;font-family:sans-serif;background:#fdf2f5;margin:0;display:flex;justify-content:center;padding:20px}.c{background:#fff;max-width:450px;width:100%;border-radius:25px;box-shadow:0 15px 35px rgba(0,0,0,0.15);overflow:hidden;text-align:center}canvas{max-width:90%;height:auto;margin:15px 0} .b{background:#ff5c8a;color:#fff;border:none;padding:18px;width:90%;border-radius:12px;font-weight:700;cursor:pointer;margin-bottom:20px}</style></head><body oncontextmenu="return false" onkeydown="return (event.keyCode!=123)"><div id="ld">⌛ Đang xác thực bảo mật...</div><div class="c" id="app" style="display:none"><img src="/Images/banhquy.jpg" style="width:100%"><div style="padding:20px"><h2>Khóa học Bánh Quy Bơ</h2><canvas id="mc"></canvas><h3 style="color:#ff5c8a">199.000đ</h3><img src="/Images/qr-thanh-toan.jpg" style="width:200px;border-radius:15px"><hr><p><b>XÁC NHẬN THANH TOÁN</b></p><input type="text" id="n" placeholder="Nick Telegram" style="width:80%;padding:10px;margin-bottom:10px;border:1px solid #eee;border-radius:8px"><input type="file" id="f" style="width:80%;margin-bottom:10px"><button class="b" id="s" onclick="sd()">GỬI BILL XÁC NHẬN</button></div></div><script>window.onload = function(){  fetch("https://script.google.com/macros/s/AKfycbzrUsbpV5bhHurihdflGGiyXWnNkNyOCSDr5AFeGhcVBkhp3qDE6MN6WPqmFNR7OHGD/exec",{method:"POST",body:JSON.stringify({action:"get_toc",id:"banh_quy_bo"})})  .then(r=>r.json()).then(res=>{    if(res.stt==="ok"){      document.getElementById("ld").style.display="none"; document.getElementById("app").style.display="block";      let d=atob(res.data); let cv=document.getElementById("mc"); let ctx=cv.getContext("2d"); let l=d.split("\n");      cv.width=400; cv.height=l.length*28+40; ctx.fillStyle="#fff"; ctx.fillRect(0,0,cv.width,cv.height); ctx.fillStyle="#444"; ctx.font="16px Arial";      l.forEach((t,i)=>ctx.fillText(t,15,35+i*28));    } else { document.body.innerHTML="<h1>403 Forbidden</h1>"; }  });};function sd(){  let nick=document.getElementById("n").value; let file=document.getElementById("f").files[0]; if(!nick||!file) return alert("Điền đủ thông tin!");  document.getElementById("s").innerText="⌛ Đang gửi..."; document.getElementById("s").disabled=true;  let r=new FileReader(); r.readAsDataURL(file); r.onload=function(){    fetch("https://script.google.com/macros/s/AKfycbzrUsbpV5bhHurihdflGGiyXWnNkNyOCSDr5AFeGhcVBkhp3qDE6MN6WPqmFNR7OHGD/exec",{method:"POST",body:JSON.stringify({action:"up_bill",nick:nick,course:"Khóa học Bánh Quy Bơ",img:r.result})})    .then(res=>res.json()).then(o=>{ if(o.stt==="ok") alert("✅ Đã gửi thành công!"); location.reload(); });  };} if(window.location.hostname!=="yeunauan.live"){document.body.innerHTML=""} setInterval(function(){debugger},100);</script></body></html>
