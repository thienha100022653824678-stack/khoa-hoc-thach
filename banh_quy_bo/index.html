<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Khóa học Bánh Quy Bơ</title><style>body{-webkit-user-select:none;user-select:none;font-family:sans-serif;background:#fff5f7;margin:0;padding:20px;display:flex;justify-content:center}
  .card{background:white;max-width:480px;width:100%;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,.1);overflow:hidden;text-align:center}
  canvas{width:100%;margin-top:10px;background:#fff} 
  input{width:80%;padding:12px;margin:10px 0;border:1px solid #ddd;border-radius:8px;outline:none}
  button{background:#ff5c8a;color:white;border:none;padding:15px;width:90%;border-radius:10px;margin:15px;font-weight:700;cursor:pointer;transition:0.3s}</style></head>
  <body><div class="card"><img src="/Images/banhquy.jpg" style="width:100%"><h2>Khóa học Bánh Quy Bơ</h2><canvas id="toc"></canvas>
  <p style="color:#ff5c8a;font-weight:700;font-size:20px">199.000đ</p><img src="/Images/qr-thanh-toan.jpg" style="width:200px;border-radius:15px"><hr>
  <b>XÁC NHẬN THANH TOÁN</b><br><input id="n" placeholder="Nick Telegram"><br><input type="file" id="f" accept="image/png, image/jpeg"><br><button id="btn" onclick="sd()">GỬI BILL XÁC NHẬN</button></div>
  <script>
    if(location.hostname !== "yeunauan.live"){document.body.innerHTML="Access denied";throw new Error();}
    function getFP(){
      const raw = navigator.userAgent + navigator.platform + screen.width + screen.height + navigator.language + (navigator.deviceMemory || 0) + (navigator.hardwareConcurrency || 0) + (navigator.maxTouchPoints || 0) + Intl.DateTimeFormat().resolvedOptions().timeZone;
      return btoa(raw).replace(/=/g,'').slice(-45);
    }
    const fp = getFP(), API = "https://script.google.com/macros/s/AKfycbxnZIRbcHx0e1BuV8lagV1bVTz1D3WgoUbDF3JbgMtAcGeQBjY/exec", CID = "banh_quy_bo";
    let TK="", TM="";
    
    async function init(){
      try {
        const r=await fetch(API,{method:"POST",body:JSON.stringify({action:"get_token",fp:fp,id:CID})});
        const d=await r.json(); TK=d.token; TM=d.time; load();
      } catch(e){ alert("Hệ thống bận, vui lòng thử lại!"); }
    }
    async function load(){
      const r=await fetch(API,{method:"POST",body:JSON.stringify({action:"get_toc",id:CID,fp:fp,token:TK,time:TM})});
      const d=await r.json(); if(d.stt==="ok") draw(atob(d.data));
    }
    function draw(t){
      const l=t.split("\n"), cv=document.getElementById("toc"), ctx=cv.getContext("2d");
      cv.width=420; cv.height=l.length*28+40; ctx.fillStyle="#fff"; ctx.fillRect(0,0,cv.width,cv.height);
      ctx.fillStyle = "rgba(0,0,0,0.05)"; for(let i=0; i<300; i++) ctx.fillRect(Math.random()*cv.width, Math.random()*cv.height, 1, 1);
      ctx.globalAlpha = 0.08; ctx.fillStyle = "#000"; ctx.font = "11px Arial";
      for(let i=0; i<cv.height; i+=80) ctx.fillText("ID:"+fp.slice(-10)+"-"+Date.now().toString().slice(-4), (i%150), i);
      ctx.globalAlpha = 1.0; ctx.fillStyle="#333"; ctx.font="16px Arial"; l.forEach((s,i)=>ctx.fillText(s,25,40+i*26));
    }
    async function sd(){
      const n=document.getElementById("n").value, f=document.getElementById("f").files[0], b=document.getElementById("btn");
      if(!n||!f) return alert("Vui lòng điền đủ thông tin!");
      if(f.size > 2000000) return alert("Ảnh quá lớn (<2MB)");
      b.innerText="⌛ ĐANG GỬI..."; b.disabled=true;
      const r=new FileReader(); r.readAsDataURL(f);
      r.onload=async()=>{
        const res=await fetch(API,{method:"POST",body:JSON.stringify({action:"up_bill",nick:n,course:"Khóa học Bánh Quy Bơ",course_id:CID,img:r.result,fp:fp,token:TK,time:TM})});
        const o=await res.json(); 
        if(o.stt==="ok"){ alert("✅ Gửi bill thành công!"); location.reload(); }
        else { alert("Lỗi gửi đơn!"); b.innerText="GỬI BILL"; b.disabled=false; }
      };
    }
    init();
  </script></body></html>
