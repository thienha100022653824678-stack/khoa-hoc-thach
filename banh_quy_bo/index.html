<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Khóa học Bánh Quy Bơ</title><style>:root { --pk: #ff5c8a; } body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 10px; } .card { background: white; width: 100%; max-width: 420px; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); } .hero img { width: 100%; height: 260px; object-fit: cover; } .content { padding: 25px; } .price-new { font-size: 32px; font-weight: 800; color: #333; } .price-old { text-decoration: line-through; color: #bbb; margin-left: 10px; } .timer { background: #fff9db; padding: 10px; border-radius: 10px; color: #ff2e63; font-weight: bold; margin: 15px 0; font-size: 18px; text-align: center; } .btn-reg { background: linear-gradient(135deg, #ff85a2, #ff5c8a); color: white; border: none; width: 100%; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 18px; }</style></head><body><div class="card"><div class="hero"><img src="/Images/banhquy.jpg"></div><div class="content"><h1>Khóa học Bánh Quy Bơ</h1><p style="color:#666">Tự tay làm bánh quy bơ thơm lừng tại nhà!</p><div class="price-row"><span class="price-new">199.000đ</span><span class="price-old">399.000đ</span></div><div class="timer">⏱ <span id="timer">60:00</span></div><button class="btn-reg" onclick="alert('Vui lòng quét mã QR thanh toán')">Đăng ký ngay</button></div></div><script>let k="t_banh_quy_bo", s=localStorage.getItem(k)||Math.floor(Date.now()/1000);localStorage.setItem(k,s);setInterval(()=>{let l=3600-(Math.floor(Date.now()/1000)-s);if(l<=0)return;let m=Math.floor(l/60),se=l%60;document.getElementById('timer').innerText=(m<10?'0'+m:m)+":"+(se<10?'0'+se:se);},1000);</script></body></html>
