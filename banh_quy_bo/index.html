<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Khóa học Bánh Quy Bơ</title><style>:root { --pk: #ff5c8a; } body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 10px; } .card { background: white; width: 100%; max-width: 420px; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); } .hero img { width: 100%; height: 260px; object-fit: cover; } .content { padding: 25px; } .price-new { font-size: 32px; font-weight: 800; color: #333; } .price-old { text-decoration: line-through; color: #bbb; margin-left: 10px; } .timer { background: #fff9db; padding: 10px; border-radius: 10px; color: #ff2e63; font-weight: bold; margin: 15px 0; font-size: 18px; text-align: center; } .btn-reg { background: linear-gradient(135deg, #ff85a2, #ff5c8a); color: white; border: none; width: 100%; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 18px; }</style></head><body><div class="card"><div class="hero"><img src="/Images/banhquy.jpg"></div><div class="content"><h1>Khóa học Bánh Quy Bơ</h1><p style="color:#666">Tự tay làm bánh quy bơ thơm lừng tại nhà!</p><div class="price-row"><span class="price-new">199.000đ</span><span class="price-old">399.000đ</span></div><div class="timer">⏱ <span id="timer">Đang tính toán...</span></div><button class="btn-reg">Đăng ký ngay</button></div></div>
  <script>
    function parseDate(str) {
      const p = str.split('/');
      return new Date(p[4], p[3]-1, p[2], p[0], p[1]).getTime();
    }
    const endTime = parseDate("18/20/10/03/2026");
    setInterval(() => {
      const now = new Date().getTime();
      const diff = endTime - now;
      if (diff <= 0) { document.getElementById('timer').innerText = "Hết hạn ưu đãi!"; return; }
      const d = Math.floor(diff / (1000 * 60 * 60 * 24));
      const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const s = Math.floor((diff % (1000 * 60)) / 1000);
      document.getElementById('timer').innerText = (d > 0 ? d + "n " : "") + (h<10?'0'+h:h) + ":" + (m<10?'0'+m:m) + ":" + (s<10?'0'+s:s);
    }, 1000);
  </script></body></html>
